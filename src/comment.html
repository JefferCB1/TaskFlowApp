<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Añadir Comentario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="add_styles.css">
  </head>
  <body>
    <form id="comment-form">
      <h2>Añadir Comentario Final</h2>
      <div class="form-group">
        <label for="comment-text">Comentario:</label>
        <textarea id="comment-text" rows="4" autofocus></textarea>
      </div>
      <button type="submit">Completar Tarea</button>
    </form>
    <script src="./comment_renderer.js"></script>
  </body>
</html>
